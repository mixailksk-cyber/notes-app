name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '18'
      - run: npm install -g eas-cli
      - run: npm install
      - run: eas build --platform android --profile preview --non-interactive
      - uses: actions/upload-artifact@v2
        with:
          name: app-apk
          path: '*.apk'
